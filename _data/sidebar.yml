info-section:
  - image: /images/sydney-about-me.jpeg
    arch: true
    description: >-
      Welcome to my Black Sail Editing. Great stories feel effortless when you
      read them, but in truth, there's so much happening beneath the surface. I
      love working in that space, looking at the structure, plot, and characters
      that shape a manuscript and helping writers bring those elements into
      focus. As a developmental editor, I focus on the big picture and help you
      refine your story so it is clear, engaging, and emotionally satisfying for
      your readers.
    link: /about
    button-text: More about me
