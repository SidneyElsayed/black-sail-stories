<head>

  <!-- SEO meta-fields -->
  <title>{{page.seo.title | default: site.data.seo.seo.title }}</title>
  <meta name="description" content="{{page.seo.description | default: site.data.seo.seo.description}}">
  <meta property="og:image" content="{{page.data.seo.image | default: site.data.seo.seo.image}}"/>
  
  <meta name="google" content="nositelinkssearchbox">
  {% if site.data.seo.seo.google-site-verification %}
    <meta name="google-site-verification" content="{{site.data.seo.seo.google-site-verification}}">
  {% endif %}
  
  
  {% if page.seo.index == true %}
    <meta name="robots" content="all">
  {% else %}
    <meta name="robots" content="none">
  {% endif %}

  <!-- Alpine JS -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Font Awesome Version 6 Kit for Icons  -->
  <script src="https://kit.fontawesome.com/6015055b20.js" crossorigin="anonymous"></script>
  
  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Babylonica&family=Bitter:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <!-- Metadata for favicon -->
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Black Sail Editing" />
  <link rel="manifest" href="/favicon/site.webmanifest" />

  <!-- CUSTOM STYLESHEET -->
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
